components:
  schemas:
    Address:
      type: object
      properties:
        adrname:
          type: string
          description: Short name to identify the adress
          maxLength: 60
        address:
          type: string
          description: Your full address
        is_default:
          type: boolean
        adrofuser:
          type: string
          format: uuid
      required:
      - address
      - adrname
      - adrofuser
      - is_default
    BlankEnum:
      enum:
      - ''
    CartItem:
      type: object
      properties:
        menu_item:
          type: integer
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        id:
          type: integer
          readOnly: true
        item_name:
          type: string
          readOnly: true
        item_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          readOnly: true
        item_total:
          type: string
          readOnly: true
      required:
      - id
      - item_name
      - item_price
      - item_total
      - menu_item
      - quantity
    CategoryEnum:
      enum:
      - a
      - m
      - d
      - b
      - s
      type: string
      description: |-
        * `a` - Appteizer
        * `m` - Main Course
        * `d` - Desert
        * `b` - Beverage
        * `s` - Side Dish
    CuisineTypeEnum:
      enum:
      - it
      - ch
      - in
      - me
      - am
      - ja
      - th
      - md
      type: string
      description: |-
        * `it` - Italian
        * `ch` - Chinese
        * `in` - Indian
        * `me` - Mexican
        * `am` - American
        * `ja` - Japanese
        * `th` - Thai
        * `md` - Mediterranean
    CustomProfile:
      type: object
      properties:
        user:
          type: string
          format: uuid
        avatar:
          type: string
          format: uri
          nullable: true
        total_orders:
          type: string
          readOnly: true
        loyalty_points:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
      required:
      - total_orders
      - user
    CustomUserRegistration:
      type: object
      properties:
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        phone_number:
          type: string
          pattern: ^\+?1?\d{9,15}$
          maxLength: 13
        password:
          type: string
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
        first_name:
          type: string
          maxLength: 20
        last_name:
          type: string
          maxLength: 20
        utype:
          description: "User Type\n\n* `c` - Customer\n* `r` - Restaurant Owner\n*
            `d` - Delivery Driver   "
          oneOf:
          - $ref: '#/components/schemas/UtypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
      required:
      - email
      - first_name
      - last_name
      - password
      - password_confirm
      - phone_number
      - username
    DietaryInfoEnum:
      enum:
      - v1
      - v2
      - gf
      - df
      - 'no'
      type: string
      description: |-
        * `v1` - Vegetarian
        * `v2` - Vegan
        * `gf` - Gluten-Free
        * `df` - Dairy-Free
        * `no` - None
    DriverProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        avatar:
          type: string
          format: uri
          nullable: true
