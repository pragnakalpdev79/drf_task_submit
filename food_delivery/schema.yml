          - $ref: '#/components/schemas/BlankEnum'
        vehicle_number:
          type: string
          maxLength: 10
        license_number:
          type: string
          maxLength: 10
        is_available:
          type: boolean
        total_deliveries:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        average_rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,1})?$
        user:
          type: string
          format: uuid
